<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Flappy Kiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87CEEB;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ═══════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════

const CONFIG = {
  LOGICAL_WIDTH: 400,
  LOGICAL_HEIGHT: 600,
  MIN_CANVAS_WIDTH: 300,
  MIN_CANVAS_HEIGHT: 400,
  GHOST_X_RATIO: 0.25,
  GHOST_WIDTH: 48,
  GHOST_HEIGHT: 48,
  GHOST_HITBOX_RADIUS: 12,
  FLAP_VELOCITY: -300,        // px/s
  GRAVITY: 800,               // px/s²
  MAX_FALL_SPEED: 600,        // px/s
  MAX_RISE_SPEED: -720,       // px/s
  MAX_DELTA_TIME: 0.05,       // seconds
  SPRITE_FRAME_WIDTH: 32,
  SPRITE_FRAME_HEIGHT: 32,
  ANIM_IDLE_FRAMES: [0, 1],
  ANIM_IDLE_FRAME_DURATION: 300,
  ANIM_FLAP_FRAMES: [2, 3, 4],
  ANIM_FLAP_FRAME_DURATION: 80,
  ANIM_DEATH_FRAMES: [5],
  ANIM_DEATH_FRAME_DURATION: 0,
  PIPE_WIDTH: 50,
  GAP_HEIGHT: 140,
  SPAWN_SPACING: 350,
  MIN_PIPE_HEIGHT: 50,
  BASE_PIPE_SPEED: 120,       // px/s
  MAX_PIPE_SPEED: 300,        // px/s
  SPEED_INCREMENT: 6,         // px/s per 5 points
  SCORE_INTERVAL: 5,
  GROUND_HEIGHT: 60,
  PARTICLE_EMIT_INTERVAL: 3,
  PARTICLE_LIFESPAN: 500,
  PARTICLE_MIN_RADIUS: 2,
  PARTICLE_MAX_RADIUS: 4,
  PARTICLE_INITIAL_OPACITY: 0.6,
  PARTICLE_OFFSET_RANGE: 3,
  CLOUD_COUNT_MIN: 3,
  CLOUD_COUNT_MAX: 6,
  CLOUD_MIN_SPEED: 15,
  CLOUD_MAX_SPEED: 60,
  CLOUD_MIN_OPACITY: 0.3,
  CLOUD_MAX_OPACITY: 0.7,
  SHAKE_DURATION: 300,
  SHAKE_INTENSITY: 5,
  POPUP_DURATION: 800,
  POPUP_RISE: 30,
  MUSIC_VOLUME: 0.3,
  RESTART_DELAY: 500,
  COLOR_SKY: '#87CEEB',
  COLOR_GROUND: '#1a1a3e',
  COLOR_PIPE: '#2ecc40',
  COLOR_CLOUD: '#ffffff',
  COLOR_UI_BG: 'rgba(0, 0, 0, 0.7)',
  COLOR_UI_TEXT: '#ffffff',
  COLOR_UI_ACCENT: '#FFD700',
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════

const gameState = {
  state: 'idle',
  ghost: {
    x: CONFIG.LOGICAL_WIDTH * CONFIG.GHOST_X_RATIO,
    y: CONFIG.LOGICAL_HEIGHT / 2 - CONFIG.GHOST_HEIGHT / 2,
    vy: 0,
    sprite: {
      currentAnim: 'idle',
      frameIndex: 0,
      elapsed: 0,
      currentFrame: 0,
    },
  },
  pipes: [],
  particles: [],
  scorePopups: [],
  clouds: [],
  score: 0,
  highScore: 0,
  gameOverTime: null,
  shake: { active: false, elapsed: 0, offsetX: 0, offsetY: 0 },
  lastTimestamp: null,
  frameCount: 0,
};

// Initialize high score from localStorage
(function() {
  try {
    gameState.highScore = parseInt(localStorage.getItem('flappyKiro_highScore'), 10) || 0;
  } catch (e) {
    gameState.highScore = 0;
  }
})();

// Initialize clouds after gameState is defined
initClouds();

const ANIMATIONS = {
  idle: { frames: CONFIG.ANIM_IDLE_FRAMES, frameDuration: CONFIG.ANIM_IDLE_FRAME_DURATION },
  flap: { frames: CONFIG.ANIM_FLAP_FRAMES, frameDuration: CONFIG.ANIM_FLAP_FRAME_DURATION },
  death: { frames: CONFIG.ANIM_DEATH_FRAMES, frameDuration: CONFIG.ANIM_DEATH_FRAME_DURATION },
};

// ═══════════════════════════════════════
// ASSETS
// ═══════════════════════════════════════

const spriteSheet = new Image();
spriteSheet.src = 'assets/ghosty.png';

const pipeImage = new Image();
pipeImage.src = 'assets/pipe-clean.png';

// Character images
const characterImages = {
  ghosty: new Image(),
  mario: new Image(),
  angrybird: new Image(),
};
characterImages.ghosty.src = 'assets/ghosty.png';
characterImages.mario.src = 'assets/mario-clean.png';
characterImages.angrybird.src = 'assets/angry-bird-clean.png';

// Character selection state
var selectedCharacter = 'ghosty';
var showingCharacterSelect = false;

const sounds = {
  jump: new Audio('assets/jump.wav'),
  gameOver: new Audio('assets/game_over.wav'),
  score: new Audio('assets/score.wav'),
  music: new Audio('assets/background_music.mp3'),
};

// Audio preloading configuration
sounds.jump.preload = 'auto';
sounds.jump.volume = 0.5;
sounds.gameOver.preload = 'auto';
sounds.gameOver.volume = 0.7;
sounds.score.preload = 'auto';
sounds.score.volume = 0.6;
sounds.music.preload = 'auto';
sounds.music.volume = CONFIG.MUSIC_VOLUME;
sounds.music.loop = true;

// ═══════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let scale = 1;
let offsetX = 0;
let offsetY = 0;

function resizeCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Fill the entire viewport
  canvas.width = vw;
  canvas.height = vh;

  // Determine scale: fit the logical play area within the viewport
  // On portrait (tall) screens: scale by width so pipes fill the screen width
  // On landscape (wide) screens: scale by height so the full vertical space is used
  var scaleByWidth = vw / CONFIG.LOGICAL_WIDTH;
  var scaleByHeight = vh / CONFIG.LOGICAL_HEIGHT;

  // Use the smaller scale to ensure the entire logical area fits
  // But prioritize: on very narrow portrait screens, scale by width
  if (vh / vw > CONFIG.LOGICAL_HEIGHT / CONFIG.LOGICAL_WIDTH) {
    // Portrait-ish: wider relative to game ratio, scale by width
    scale = scaleByWidth;
  } else {
    // Landscape-ish: scale by height
    scale = scaleByHeight;
  }

  // Center the logical play area within the viewport
  offsetX = (vw - CONFIG.LOGICAL_WIDTH * scale) / 2;
  offsetY = (vh - CONFIG.LOGICAL_HEIGHT * scale) / 2;

  // Ensure offsets are never negative (clip instead)
  if (offsetX < 0) offsetX = 0;
  if (offsetY < 0) offsetY = 0;

  canvas.style.left = '0px';
  canvas.style.top = '0px';
  canvas.style.width = vw + 'px';
  canvas.style.height = vh + 'px';

  document.documentElement.style.overflow = 'hidden';
  document.body.style.overflow = 'hidden';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', function() {
  setTimeout(resizeCanvas, 100);
});

// ═══════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════

function updateGhostAnimation(dtMs) {
  var sprite = gameState.ghost.sprite;
  var anim = ANIMATIONS[sprite.currentAnim];

  // Death holds indefinitely — no frame advancement
  if (sprite.currentAnim === 'death') return;

  sprite.elapsed += dtMs;
  if (sprite.elapsed >= anim.frameDuration) {
    sprite.elapsed -= anim.frameDuration;
    sprite.frameIndex++;

    if (sprite.frameIndex >= anim.frames.length) {
      if (sprite.currentAnim === 'idle') {
        sprite.frameIndex = 0; // loop
      } else if (sprite.currentAnim === 'flap') {
        // Flap completed — return to idle
        sprite.currentAnim = 'idle';
        sprite.frameIndex = 0;
        sprite.elapsed = 0;
      }
    }
  }
  sprite.currentFrame = ANIMATIONS[sprite.currentAnim].frames[sprite.frameIndex];
}

function setGhostAnimState(state) {
  var sprite = gameState.ghost.sprite;
  if (sprite.currentAnim === state) return;
  sprite.currentAnim = state;
  sprite.frameIndex = 0;
  sprite.elapsed = 0;
  sprite.currentFrame = ANIMATIONS[state].frames[0];
}

function getGhostHitbox() {
  var ghost = gameState.ghost;
  return {
    cx: ghost.x + CONFIG.GHOST_WIDTH / 2,
    cy: ghost.y + CONFIG.GHOST_HEIGHT / 2,
    radius: CONFIG.GHOST_HITBOX_RADIUS,
  };
}

function updateGhost(dt) {
  var ghost = gameState.ghost;

  // 1. Apply gravity to velocity
  ghost.vy += CONFIG.GRAVITY * dt;

  // 2. Clamp velocity to allowed range
  ghost.vy = Math.max(CONFIG.MAX_RISE_SPEED, Math.min(ghost.vy, CONFIG.MAX_FALL_SPEED));

  // 3. Update position
  ghost.y += ghost.vy * dt;

  // 4. Clamp top boundary
  if (ghost.y < 0) {
    ghost.y = 0;
    ghost.vy = 0;
  }

  // 5. Update sprite animation (dt is in seconds, animation needs ms)
  updateGhostAnimation(dt * 1000);
}

function renderGhost(ctx) {
  var ghost = gameState.ghost;
  var halfW = CONFIG.GHOST_WIDTH / 2;
  var halfH = CONFIG.GHOST_HEIGHT / 2;

  // Calculate rotation based on velocity (visual only)
  var rotation = 0;
  if (ghost.vy < 0) {
    rotation = -10; // rising: nose up
  } else if (ghost.vy > 0) {
    rotation = Math.min(ghost.vy / CONFIG.MAX_FALL_SPEED * 10, 10); // falling: proportional clockwise
  }

  ctx.save();
  ctx.translate(ghost.x + halfW, ghost.y + halfH); // move to sprite center
  ctx.rotate(rotation * Math.PI / 180);             // apply rotation

  var charImg = characterImages[selectedCharacter];
  if (charImg && charImg.complete && charImg.naturalWidth > 0) {
    ctx.drawImage(charImg, -halfW, -halfH, CONFIG.GHOST_WIDTH, CONFIG.GHOST_HEIGHT);
  } else {
    // Fallback: white filled circle
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, CONFIG.GHOST_HITBOX_RADIUS, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════
// PIPES
// ═══════════════════════════════════════

function getPipeSpeed(score) {
  return Math.min(
    CONFIG.BASE_PIPE_SPEED + CONFIG.SPEED_INCREMENT * Math.floor(score / CONFIG.SCORE_INTERVAL),
    CONFIG.MAX_PIPE_SPEED
  );
}

function spawnPipe() {
  var minY = CONFIG.MIN_PIPE_HEIGHT + CONFIG.GAP_HEIGHT / 2;
  var maxY = CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT - CONFIG.MIN_PIPE_HEIGHT - CONFIG.GAP_HEIGHT / 2;
  var gapCenterY = minY + Math.random() * (maxY - minY);

  gameState.pipes.push({
    x: CONFIG.LOGICAL_WIDTH,
    gapCenterY: gapCenterY,
    width: CONFIG.PIPE_WIDTH,
    scored: false
  });
}

function updatePipes(dt) {
  var currentSpeed = getPipeSpeed(gameState.score);

  // Move all pipes leftward
  for (var i = 0; i < gameState.pipes.length; i++) {
    gameState.pipes[i].x -= currentSpeed * dt;
  }

  // Remove off-screen pipes from the front
  while (gameState.pipes.length > 0 && gameState.pipes[0].x + CONFIG.PIPE_WIDTH < 0) {
    gameState.pipes.splice(0, 1);
  }

  // Spawn new pipe if needed
  if (gameState.pipes.length === 0) {
    spawnPipe();
  } else {
    var rightmost = gameState.pipes[gameState.pipes.length - 1];
    if (rightmost.x <= CONFIG.LOGICAL_WIDTH - CONFIG.SPAWN_SPACING) {
      spawnPipe();
    }
  }
}

function renderPipes(ctx) {
  var pipeLoaded = pipeImage.complete && pipeImage.naturalWidth > 0;

  for (var i = 0; i < gameState.pipes.length; i++) {
    var pipe = gameState.pipes[i];
    var gapTop = pipe.gapCenterY - CONFIG.GAP_HEIGHT / 2;
    var gapBottom = pipe.gapCenterY + CONFIG.GAP_HEIGHT / 2;
    var groundTop = CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT;

    if (pipeLoaded) {
      // Top pipe: draw normally (opening/cap at bottom, facing down toward gap)
      var topH = gapTop;
      if (topH > 0) {
        ctx.drawImage(pipeImage, pipe.x, 0, CONFIG.PIPE_WIDTH, topH);
      }

      // Bottom pipe: flip vertically (opening/cap at top, facing up toward gap)
      var bottomH = groundTop - gapBottom;
      if (bottomH > 0) {
        ctx.save();
        ctx.translate(pipe.x, gapBottom);
        ctx.scale(1, -1);
        ctx.drawImage(pipeImage, 0, -bottomH, CONFIG.PIPE_WIDTH, bottomH);
        ctx.restore();
      }
    } else {
      ctx.fillStyle = CONFIG.COLOR_PIPE;
      ctx.fillRect(pipe.x, 0, CONFIG.PIPE_WIDTH, gapTop);
      ctx.fillRect(pipe.x, gapBottom, CONFIG.PIPE_WIDTH, groundTop - gapBottom);
    }
  }
}

// ═══════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════

function circleRectOverlap(circle, rect) {
  var closestX = Math.max(rect.x, Math.min(circle.cx, rect.x + rect.width));
  var closestY = Math.max(rect.y, Math.min(circle.cy, rect.y + rect.height));
  var dx = circle.cx - closestX;
  var dy = circle.cy - closestY;
  return (dx * dx + dy * dy) <= (circle.radius * circle.radius);
}

function checkPipeCollision(circle, pipe) {
  var gapTop = pipe.gapCenterY - CONFIG.GAP_HEIGHT / 2;
  var gapBottom = pipe.gapCenterY + CONFIG.GAP_HEIGHT / 2;
  var groundY = CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT;

  // Top pipe rect: from y=0 to gap top edge
  var topRect = { x: pipe.x, y: 0, width: CONFIG.PIPE_WIDTH, height: gapTop };
  if (circleRectOverlap(circle, topRect)) return true;

  // Bottom pipe rect: from gap bottom edge to ground top
  var bottomRect = { x: pipe.x, y: gapBottom, width: CONFIG.PIPE_WIDTH, height: groundY - gapBottom };
  if (circleRectOverlap(circle, bottomRect)) return true;

  return false;
}

function checkGroundCollision(circle) {
  var groundY = CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT;
  return (circle.cy + circle.radius) >= groundY;
}

function checkCollisions() {
  var ghost = gameState.ghost;
  var circle = getGhostHitbox();

  // Fast path: check ground collision first
  if (checkGroundCollision(circle)) {
    triggerGameOver();
    return true;
  }

  // Only check pipes near the ghost for optimization
  for (var i = 0; i < gameState.pipes.length; i++) {
    var pipe = gameState.pipes[i];
    // Broad phase: skip pipes that are clearly not near the ghost
    if (pipe.x >= ghost.x + CONFIG.GHOST_WIDTH) continue;
    if (pipe.x + CONFIG.PIPE_WIDTH <= ghost.x - CONFIG.GHOST_HITBOX_RADIUS) continue;

    if (checkPipeCollision(circle, pipe)) {
      triggerGameOver();
      return true;
    }
  }

  return false;
}

function triggerGameOver() {
  gameState.state = 'gameover';
  gameState.gameOverTime = performance.now();
  setGhostAnimState('death');

  // Trigger screen shake
  gameState.shake.active = true;
  gameState.shake.elapsed = 0;

  // Save high score
  saveHighScore(gameState.score);

  // Play game over sound and stop music
  playSound('gameOver');
  stopMusic();
}

// ═══════════════════════════════════════
// SCREEN SHAKE
// ═══════════════════════════════════════

function updateShake(dt) {
  var shake = gameState.shake;
  if (!shake.active) return;

  shake.elapsed += dt * 1000;

  if (shake.elapsed >= CONFIG.SHAKE_DURATION) {
    shake.active = false;
    shake.offsetX = 0;
    shake.offsetY = 0;
    return;
  }

  var intensity = CONFIG.SHAKE_INTENSITY * (1 - shake.elapsed / CONFIG.SHAKE_DURATION);
  shake.offsetX = (Math.random() * 2 - 1) * intensity;
  shake.offsetY = (Math.random() * 2 - 1) * intensity;
}

// ═══════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════

const PARTICLE_POOL_SIZE = 50;
const particlePool = [];
for (var i = 0; i < PARTICLE_POOL_SIZE; i++) {
  particlePool.push({ x: 0, y: 0, radius: 2, elapsed: 0, active: false });
}

function emitParticle() {
  // Find an inactive particle in the pool
  for (var i = 0; i < PARTICLE_POOL_SIZE; i++) {
    if (!particlePool[i].active) {
      var p = particlePool[i];
      p.x = gameState.ghost.x;
      p.y = gameState.ghost.y + CONFIG.GHOST_HEIGHT / 2 + (Math.random() * 2 - 1) * CONFIG.PARTICLE_OFFSET_RANGE;
      p.radius = CONFIG.PARTICLE_MIN_RADIUS + Math.floor(Math.random() * (CONFIG.PARTICLE_MAX_RADIUS - CONFIG.PARTICLE_MIN_RADIUS + 1));
      p.elapsed = 0;
      p.active = true;
      return;
    }
  }
}

function updateParticles(dt) {
  gameState.frameCount++;
  if (gameState.frameCount % CONFIG.PARTICLE_EMIT_INTERVAL === 0) {
    emitParticle();
  }
  var dtMs = dt * 1000;
  for (var i = 0; i < PARTICLE_POOL_SIZE; i++) {
    if (particlePool[i].active) {
      particlePool[i].elapsed += dtMs;
      if (particlePool[i].elapsed >= CONFIG.PARTICLE_LIFESPAN) {
        particlePool[i].active = false;
      }
    }
  }
}

function renderParticles(ctx) {
  // Particle trail disabled — only ghosty visible
}

// ═══════════════════════════════════════
// SCORING
// ═══════════════════════════════════════

function loadHighScore() {
  try {
    return parseInt(localStorage.getItem('flappyKiro_highScore'), 10) || 0;
  } catch (e) {
    return 0;
  }
}

function saveHighScore(score) {
  try {
    if (score > loadHighScore()) {
      localStorage.setItem('flappyKiro_highScore', String(score));
    }
  } catch (e) {
    // silently fail
  }
}

function updateScore() {
  var ghost = gameState.ghost;
  for (var i = 0; i < gameState.pipes.length; i++) {
    var pipe = gameState.pipes[i];
    if (ghost.x > pipe.x + CONFIG.PIPE_WIDTH && !pipe.scored) {
      pipe.scored = true;
      gameState.score++;
      playSound('score');
      gameState.scorePopups.push({ x: ghost.x, y: ghost.y, elapsed: 0 });
      if (gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        saveHighScore(gameState.score);
      }
    }
  }
}

function updateScorePopups(dt) {
  for (var i = gameState.scorePopups.length - 1; i >= 0; i--) {
    gameState.scorePopups[i].elapsed += dt * 1000;
    if (gameState.scorePopups[i].elapsed >= CONFIG.POPUP_DURATION) {
      gameState.scorePopups.splice(i, 1);
    }
  }
}

function renderScore(ctx) {
  ctx.font = '16px monospace';
  ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
  ctx.shadowBlur = 2;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;

  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + gameState.score, 10, CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT + 20);

  ctx.textAlign = 'right';
  ctx.fillText('High: ' + gameState.highScore, CONFIG.LOGICAL_WIDTH - 10, CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT + 20);

  // Reset shadow and alignment
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.textAlign = 'left';
}

function renderScorePopups(ctx) {
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
  ctx.textAlign = 'left';
  for (var i = 0; i < gameState.scorePopups.length; i++) {
    var popup = gameState.scorePopups[i];
    var t = popup.elapsed;
    var opacity = 1 - t / CONFIG.POPUP_DURATION;
    var offsetY = CONFIG.POPUP_RISE * (t / CONFIG.POPUP_DURATION);
    ctx.globalAlpha = opacity;
    ctx.fillText('+1', popup.x, popup.y - offsetY);
  }
  ctx.globalAlpha = 1.0;
}

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════

var userInteracted = false;

function playSound(name) {
  try {
    if (name === 'gameOver') {
      // Exclusive: stop other sounds, play directly
      sounds.jump.pause();
      sounds.jump.currentTime = 0;
      sounds.score.pause();
      sounds.score.currentTime = 0;
      sounds.gameOver.currentTime = 0;
      sounds.gameOver.play();
    } else if (name === 'jump' || name === 'score') {
      // Overlapping: clone the node
      var clone = sounds[name].cloneNode();
      clone.volume = sounds[name].volume;
      clone.play();
    }
  } catch (e) {
    console.warn('Audio playback failed:', name, e);
  }
}

function startMusic() {
  if (!userInteracted) return;
  try {
    sounds.music.currentTime = 0;
    sounds.music.play();
  } catch (e) {
    console.warn('Music playback failed:', e);
  }
}

function stopMusic() {
  try {
    sounds.music.pause();
  } catch (e) {
    console.warn('Music pause failed:', e);
  }
}

// ═══════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════

function renderBackground(ctx) {
  ctx.fillStyle = CONFIG.COLOR_SKY;
  ctx.fillRect(0, 0, CONFIG.LOGICAL_WIDTH, CONFIG.LOGICAL_HEIGHT);
}

function initClouds() {
  var count = CONFIG.CLOUD_COUNT_MIN + Math.floor(Math.random() * (CONFIG.CLOUD_COUNT_MAX - CONFIG.CLOUD_COUNT_MIN + 1));
  var clouds = [];
  for (var i = 0; i < count; i++) {
    clouds.push({
      x: Math.random() * CONFIG.LOGICAL_WIDTH,
      y: 20 + Math.random() * (CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT - 40 - 20),
      width: 40 + Math.random() * 60,
      height: 20 + Math.random() * 20,
      speed: CONFIG.CLOUD_MIN_SPEED + Math.random() * (CONFIG.CLOUD_MAX_SPEED - CONFIG.CLOUD_MIN_SPEED),
      opacity: 0  // placeholder, will be assigned after sorting
    });
  }
  // Sort by speed ascending for speed-opacity correlation
  clouds.sort(function(a, b) { return a.speed - b.speed; });
  // Assign opacity linearly mapped from speed (slower=lower opacity, faster=higher opacity)
  for (var i = 0; i < clouds.length; i++) {
    clouds[i].opacity = CONFIG.CLOUD_MIN_OPACITY +
      (clouds[i].speed - CONFIG.CLOUD_MIN_SPEED) / (CONFIG.CLOUD_MAX_SPEED - CONFIG.CLOUD_MIN_SPEED) *
      (CONFIG.CLOUD_MAX_OPACITY - CONFIG.CLOUD_MIN_OPACITY);
  }
  gameState.clouds = clouds;
}

function updateClouds(dt) {
  for (var i = 0; i < gameState.clouds.length; i++) {
    var cloud = gameState.clouds[i];
    cloud.x -= cloud.speed * dt;
    // Wrap around when fully off-screen left
    if (cloud.x + cloud.width < 0) {
      cloud.x = CONFIG.LOGICAL_WIDTH + Math.random() * 50;
      cloud.y = 20 + Math.random() * (CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT - 40 - 20);
    }
  }
}

function renderClouds(ctx) {
  // Sort by speed ascending (slowest first = farthest back)
  var sorted = gameState.clouds.slice().sort(function(a, b) { return a.speed - b.speed; });
  for (var i = 0; i < sorted.length; i++) {
    var cloud = sorted[i];
    ctx.globalAlpha = cloud.opacity;
    ctx.fillStyle = CONFIG.COLOR_CLOUD;
    // Draw rounded rectangle
    var x = cloud.x;
    var y = cloud.y;
    var w = cloud.width;
    var h = cloud.height;
    var radius = Math.min(h / 2, 10);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;
}

function renderGround(ctx) {
  ctx.fillStyle = CONFIG.COLOR_GROUND;
  ctx.fillRect(0, CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT, CONFIG.LOGICAL_WIDTH, CONFIG.GROUND_HEIGHT);
}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════

function drawRoundedRect(ctx, x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function renderMainMenu(ctx) {
  if (showingCharacterSelect) {
    renderCharacterSelect(ctx);
    return;
  }

  var cx = CONFIG.LOGICAL_WIDTH / 2;
  var now = performance.now();

  // --- Title "FLAPPY KIRO" with shadow, large and prominent ---
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title shadow
  ctx.font = 'bold 38px sans-serif';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillText('FLAPPY KIRO', cx + 2, CONFIG.LOGICAL_HEIGHT * 0.14 + 2);

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.fillText('FLAPPY KIRO', cx, CONFIG.LOGICAL_HEIGHT * 0.14);
  ctx.restore();

  // --- Main character (single, centered, large, with gentle floating animation) ---
  var floatOffset = Math.sin(now / 800) * 6; // gentle float
  var charImg = characterImages[selectedCharacter];
  var charSize = 80;
  var charX = cx - charSize / 2;
  var charY = CONFIG.LOGICAL_HEIGHT * 0.28 + floatOffset;

  if (charImg && charImg.complete && charImg.naturalWidth > 0) {
    ctx.drawImage(charImg, charX, charY, charSize, charSize);
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(cx, charY + charSize / 2, charSize / 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- High Score badge (elegant pill shape) ---
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var badgeY = CONFIG.LOGICAL_HEIGHT * 0.48;
  var badgeW = 140;
  var badgeH = 32;
  var badgeX = cx - badgeW / 2;

  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  drawRoundedRect(ctx, badgeX, badgeY, badgeW, badgeH, badgeH / 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.font = '600 14px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('\u2B50 Best: ' + gameState.highScore, cx, badgeY + badgeH / 2);
  ctx.restore();

  // --- "Choose Your Character" button (polished, larger, with subtle glow) ---
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var btnW = 200;
  var btnH = 42;
  var btnX = cx - btnW / 2;
  var btnY = CONFIG.LOGICAL_HEIGHT * 0.57;

  // Button shadow
  ctx.fillStyle = 'rgba(39, 174, 55, 0.3)';
  drawRoundedRect(ctx, btnX + 1, btnY + 3, btnW, btnH, 12);
  ctx.fill();

  // Button background
  ctx.fillStyle = '#2ecc40';
  drawRoundedRect(ctx, btnX, btnY, btnW, btnH, 12);
  ctx.fill();

  // Button border highlight
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Button text
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Choose Your Character', cx, btnY + btnH / 2);
  ctx.restore();

  // --- Pulsing "Tap or Press Space to Start" (centered, noticeable) ---
  var pulseOpacity = 0.5 + 0.5 * Math.sin(now / 600 * Math.PI);
  ctx.save();
  ctx.globalAlpha = pulseOpacity;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '600 15px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Tap or Press Space to Start', cx, CONFIG.LOGICAL_HEIGHT * 0.72);
  ctx.restore();

  // --- Bottom ground strip (modern, subtle gradient look) ---
  var groundY = CONFIG.LOGICAL_HEIGHT - CONFIG.GROUND_HEIGHT;
  ctx.fillStyle = CONFIG.COLOR_GROUND;
  drawRoundedRect(ctx, 10, groundY + 5, CONFIG.LOGICAL_WIDTH - 20, CONFIG.GROUND_HEIGHT - 10, 10);
  ctx.fill();

  // Score display in ground
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '600 13px monospace';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
  ctx.fillText('Score: 0', cx - 60, groundY + CONFIG.GROUND_HEIGHT / 2);
  ctx.fillText('High: ' + gameState.highScore, cx + 60, groundY + CONFIG.GROUND_HEIGHT / 2);
  ctx.restore();
}

function renderCharacterSelect(ctx) {
  // Dark overlay
  ctx.fillStyle = CONFIG.COLOR_UI_BG;
  ctx.fillRect(0, 0, CONFIG.LOGICAL_WIDTH, CONFIG.LOGICAL_HEIGHT);

  // Panel
  var panelW = 320;
  var panelH = 280;
  var panelX = (CONFIG.LOGICAL_WIDTH - panelW) / 2;
  var panelY = (CONFIG.LOGICAL_HEIGHT - panelH) / 2;
  ctx.fillStyle = 'rgba(30, 30, 30, 0.95)';
  drawRoundedRect(ctx, panelX, panelY, panelW, panelH, 12);
  ctx.fill();

  // Title
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
  ctx.textAlign = 'center';
  ctx.fillText('Choose Your Character', CONFIG.LOGICAL_WIDTH / 2, panelY + 35);

  // Character options
  var characters = [
    { id: 'ghosty', name: 'Ghosty' },
    { id: 'mario', name: 'Mario' },
    { id: 'angrybird', name: 'Angry Bird' },
  ];

  var startX = panelX + 25;
  var cardY = panelY + 55;
  var cardW = 85;
  var cardH = 120;
  var gap = 15;

  for (var i = 0; i < characters.length; i++) {
    var ch = characters[i];
    var cx = startX + i * (cardW + gap);

    // Card background (highlight selected)
    if (selectedCharacter === ch.id) {
      ctx.fillStyle = 'rgba(46, 204, 64, 0.3)';
      ctx.strokeStyle = '#2ecc40';
      ctx.lineWidth = 2;
    } else {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
    }
    drawRoundedRect(ctx, cx, cardY, cardW, cardH, 8);
    ctx.fill();
    ctx.stroke();

    // Character image
    var charImg = characterImages[ch.id];
    if (charImg && charImg.complete && charImg.naturalWidth > 0) {
      ctx.drawImage(charImg, cx + cardW / 2 - 25, cardY + 15, 50, 50);
    }

    // Character name
    ctx.font = '11px sans-serif';
    ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
    ctx.textAlign = 'center';
    ctx.fillText(ch.name, cx + cardW / 2, cardY + cardH - 15);
  }

  // "Select" / confirm button
  var btnX = CONFIG.LOGICAL_WIDTH / 2 - 60;
  var btnY = panelY + panelH - 55;
  var btnW = 120;
  var btnH = 34;
  ctx.fillStyle = '#2ecc40';
  drawRoundedRect(ctx, btnX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('Confirm', CONFIG.LOGICAL_WIDTH / 2, btnY + 22);

  ctx.textAlign = 'left';
}

function renderGameOver(ctx) {
  if (showingCharacterSelect) {
    renderCharacterSelect(ctx);
    return;
  }

  // Full-screen semi-transparent dark overlay
  ctx.fillStyle = CONFIG.COLOR_UI_BG;
  ctx.fillRect(0, 0, CONFIG.LOGICAL_WIDTH, CONFIG.LOGICAL_HEIGHT);

  // Centered panel (~280×240px)
  var panelW = 280;
  var panelH = 240;
  var panelX = (CONFIG.LOGICAL_WIDTH - panelW) / 2;
  var panelY = (CONFIG.LOGICAL_HEIGHT - panelH) / 2;

  // Draw rounded panel background
  ctx.fillStyle = 'rgba(30, 30, 30, 0.9)';
  drawRoundedRect(ctx, panelX, panelY, panelW, panelH, 10);
  ctx.fill();

  // "GAME OVER" title at top of panel
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CONFIG.LOGICAL_WIDTH / 2, panelY + 40);

  // "Score: X" below title
  ctx.font = '18px sans-serif';
  ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
  ctx.fillText('Score: ' + gameState.score, CONFIG.LOGICAL_WIDTH / 2, panelY + 75);

  // "Best: X" below score
  ctx.fillText('Best: ' + gameState.highScore, CONFIG.LOGICAL_WIDTH / 2, panelY + 105);

  // Conditional "New High Score!" in gold
  if (gameState.score > 0 && gameState.score >= gameState.highScore) {
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = CONFIG.COLOR_UI_ACCENT;
    ctx.fillText('New High Score!', CONFIG.LOGICAL_WIDTH / 2, panelY + 135);
  }

  // "Choose Your Character" button
  var btnX = CONFIG.LOGICAL_WIDTH / 2 - 90;
  var btnY = panelY + 155;
  var btnW = 180;
  var btnH = 30;
  ctx.fillStyle = '#2ecc40';
  drawRoundedRect(ctx, btnX, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Choose Your Character', CONFIG.LOGICAL_WIDTH / 2, btnY + 20);

  // Pulsing restart prompt
  if (gameState.gameOverTime !== null && (performance.now() - gameState.gameOverTime) >= CONFIG.RESTART_DELAY) {
    var pulseOpacity = 0.5 + 0.5 * Math.sin(performance.now() / 500 * Math.PI);
    ctx.globalAlpha = pulseOpacity;
    ctx.font = '14px sans-serif';
    ctx.fillStyle = CONFIG.COLOR_UI_TEXT;
    ctx.fillText('Tap or press Space to restart', CONFIG.LOGICAL_WIDTH / 2, panelY + 220);
    ctx.globalAlpha = 1.0;
  }

  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════

function flap() {
  gameState.ghost.vy = CONFIG.FLAP_VELOCITY;
  setGhostAnimState('flap');
  playSound('jump');
}

function canRestart() {
  return gameState.gameOverTime !== null &&
         (performance.now() - gameState.gameOverTime) >= CONFIG.RESTART_DELAY;
}

function restart() {
  gameState.score = 0;
  gameState.pipes.length = 0;
  gameState.particles.length = 0;
  gameState.scorePopups.length = 0;
  gameState.ghost.x = CONFIG.LOGICAL_WIDTH * CONFIG.GHOST_X_RATIO;
  gameState.ghost.y = CONFIG.LOGICAL_HEIGHT / 2 - CONFIG.GHOST_HEIGHT / 2;
  gameState.ghost.vy = 0;
  setGhostAnimState('idle');
  gameState.shake.active = false;
  gameState.shake.elapsed = 0;
  gameState.shake.offsetX = 0;
  gameState.shake.offsetY = 0;
  gameState.gameOverTime = null;
  gameState.lastTimestamp = null;
  gameState.frameCount = 0;
  // Deactivate all particles in pool
  for (var i = 0; i < PARTICLE_POOL_SIZE; i++) {
    particlePool[i].active = false;
  }
  gameState.state = 'running';
  flap();
  startMusic();
}

function handleInput(e) {
  if (e.type === 'touchstart') {
    e.preventDefault();
  }

  userInteracted = true;

  // Get click position in logical coordinates
  var clickX = 0, clickY = 0;
  if (e.type === 'touchstart') {
    var touch = e.touches[0];
    clickX = (touch.clientX - offsetX) / scale;
    clickY = (touch.clientY - offsetY) / scale;
  } else if (e.type === 'mousedown') {
    clickX = (e.clientX - offsetX) / scale;
    clickY = (e.clientY - offsetY) / scale;
  }

  // Handle character select screen
  if (showingCharacterSelect) {
    handleCharacterSelectClick(clickX, clickY, e);
    return;
  }

  // Handle "Choose Your Character" button click in idle or gameover state
  if (gameState.state === 'idle' || gameState.state === 'gameover') {
    if (e.type === 'mousedown' || e.type === 'touchstart') {
      var btnW = 200;
      var btnH = 42;
      var btnX = CONFIG.LOGICAL_WIDTH / 2 - btnW / 2;
      var btnY;
      if (gameState.state === 'idle') {
        btnY = CONFIG.LOGICAL_HEIGHT * 0.57;
      } else {
        // gameover panel
        var panelH = 240;
        var panelY = (CONFIG.LOGICAL_HEIGHT - panelH) / 2;
        btnY = panelY + 155;
        btnW = 180;
        btnH = 30;
        btnX = CONFIG.LOGICAL_WIDTH / 2 - btnW / 2;
      }
      if (clickX >= btnX && clickX <= btnX + btnW && clickY >= btnY && clickY <= btnY + btnH) {
        showingCharacterSelect = true;
        return;
      }
    }
  }

  if (gameState.state === 'idle') {
    gameState.state = 'running';
    flap();
    startMusic();
  } else if (gameState.state === 'running') {
    flap();
  } else if (gameState.state === 'gameover') {
    if (canRestart()) {
      restart();
    }
  }
}

function handleCharacterSelectClick(clickX, clickY, e) {
  var panelW = 320;
  var panelH = 280;
  var panelX = (CONFIG.LOGICAL_WIDTH - panelW) / 2;
  var panelY = (CONFIG.LOGICAL_HEIGHT - panelH) / 2;

  // Character cards
  var characters = ['ghosty', 'mario', 'angrybird'];
  var startX = panelX + 25;
  var cardY = panelY + 55;
  var cardW = 85;
  var cardH = 120;
  var gap = 15;

  for (var i = 0; i < characters.length; i++) {
    var cx = startX + i * (cardW + gap);
    if (clickX >= cx && clickX <= cx + cardW && clickY >= cardY && clickY <= cardY + cardH) {
      selectedCharacter = characters[i];
      return;
    }
  }

  // Confirm button
  var btnX = CONFIG.LOGICAL_WIDTH / 2 - 60;
  var btnY = panelY + panelH - 55;
  var btnW = 120;
  var btnH = 34;
  if (clickX >= btnX && clickX <= btnX + btnW && clickY >= btnY && clickY <= btnY + btnH) {
    showingCharacterSelect = false;
    return;
  }

  // Spacebar also confirms
  if (e && e.code === 'Space') {
    showingCharacterSelect = false;
  }
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    if (showingCharacterSelect) {
      showingCharacterSelect = false;
      return;
    }
    handleInput(e);
  }
});

// Prevent default touch behaviors (scroll, zoom) on the document
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('gesturestart', function(e) { e.preventDefault(); });

function handleResize() {
  // Recalculate canvas dimensions and scale factor without resetting game state.
  // All game positions are in logical coordinates (400×600) and are unaffected
  // by the physical canvas size change. Only the scale/offset used during
  // rendering is recomputed.
  resizeCanvas();
}

// ═══════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════

function render() {
  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fill entire physical canvas with sky color (handles areas outside logical play area)
  ctx.fillStyle = CONFIG.COLOR_SKY;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Set up scaling transform for logical coordinates, centered in viewport
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

  // Apply screen shake offset
  if (gameState.shake.active) {
    ctx.translate(gameState.shake.offsetX, gameState.shake.offsetY);
  }

  // Render layers back-to-front
  renderBackground(ctx);   // Layer 1: Sky
  renderClouds(ctx);       // Layer 2: Clouds (slowest→fastest)

  if (gameState.state !== 'idle') {
    renderPipes(ctx);        // Layer 3: Pipes
    renderGround(ctx);       // Layer 4: Ground
    renderParticles(ctx);    // Layer 5: Particles
    renderGhost(ctx);        // Layer 6: Ghost sprite
    renderScorePopups(ctx);  // Layer 7: Score popups
    renderScore(ctx);        // Layer 8: HUD
  }

  // State-specific overlays
  if (gameState.state === 'gameover') {
    renderGameOver(ctx);   // Layer 9: Game-over overlay
  }
  if (gameState.state === 'idle') {
    renderMainMenu(ctx);   // Layer 10: Menu elements
  }

  ctx.restore();
}

function gameLoop(timestamp) {
  // Calculate delta-time
  if (gameState.lastTimestamp === null) {
    gameState.lastTimestamp = timestamp;
  }
  var rawDt = (timestamp - gameState.lastTimestamp) / 1000; // seconds
  gameState.lastTimestamp = timestamp;

  // Clamp delta-time to prevent large jumps
  var dt = Math.max(0, Math.min(rawDt, CONFIG.MAX_DELTA_TIME));

  // Update phase — only in running state
  if (gameState.state === 'running') {
    updateGhost(dt);
    updatePipes(dt);
    if (!checkCollisions()) {
      // Only continue updates if no collision detected this frame
      updateParticles(dt);
      updateScore();
      updateScorePopups(dt);
    }
    updateShake(dt);
    updateClouds(dt);
  } else if (gameState.state === 'idle') {
    // In idle: update clouds for visual movement, update ghost animation for idle bob
    updateClouds(dt);
    updateGhostAnimation(dt * 1000); // just animation, no physics
  } else if (gameState.state === 'gameover') {
    // In gameover: only update shake (for decay) and popups (for fade)
    updateShake(dt);
    updateScorePopups(dt);
  }

  // Render phase — always render
  render();

  // Request next frame
  requestAnimationFrame(gameLoop);
}

// Start the game loop once the sprite sheet loads (or on error for fallback)
spriteSheet.onload = function() {
  requestAnimationFrame(gameLoop);
};
spriteSheet.onerror = function() {
  console.warn('Sprite sheet failed to load, using fallback rendering');
  requestAnimationFrame(gameLoop);
};
</script>
